name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: threatlens
          POSTGRES_USER: threatlens
          POSTGRES_PASSWORD: threatlens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U threatlens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: jdbc:postgresql://localhost:5432/threatlens
      DB_USERNAME: threatlens
      DB_PASSWORD: threatlens

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn -B verify

  dependency-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build project
        run: mvn -B -DskipTests package

      # Optional: add an NVD_API_KEY repository secret and pass
      # `--nvdApiKey ${{ secrets.NVD_API_KEY }}` in args below to speed up the NVD data feed
      # download significantly. Works without one too, just slower on a cold cache.
      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: threatlens
          path: "."
          format: "HTML"
          out: "dependency-check-report"
          args: >
            --failOnCVSS 7
            --enableRetired

      - name: Upload Dependency-Check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: ${{ github.workspace }}/dependency-check-report
