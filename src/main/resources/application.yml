spring:
  application:
    name: threatlens

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/threatlens}
    username: ${DB_USERNAME:threatlens}
    password: ${DB_PASSWORD:threatlens}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: threatlens
      auto-offset-reset: earliest
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.pabloncf.threatlens.pipeline

threatlens:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
  detection:
    brute-force:
      sensitive-paths:
        - /login
        - /api/auth
      threshold: 5
      window: 1m
  kafka:
    security-events-topic: security-events
  triage:
    model: claude-haiku-4-5
    min-severity: HIGH
